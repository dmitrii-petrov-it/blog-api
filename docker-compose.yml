services:
  db:
    image: postgres:16-alpine
    container_name: blog-db
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
    ports:
      - "5432:5432"
    volumes:
      - blog-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  blog-db-data: